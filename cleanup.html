  .btn { padding:14px; font-size:14px; font-weight:700; border:none; border-radius:12px; cursor:pointer; transition:all .3s; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn-red  { background:linear-gradient(135deg,#ff4f6d,#cc3355); color:#fff; }
  .btn-green{ background:linear-gradient(135deg,#00d4b8,#00b39a); color:#07090f; }
  .btn-full { grid-column:1/-1; }
  .log { background:#07090f; border-radius:12px; padding:16px; max-height:360px; overflow-y:auto; font-family:monospace; font-size:12px; line-height:1.8; }
  .ok  { color:#1de982; }
  .err { color:#ff4f6d; }
  .inf { color:#6b82a0; }
  .warn{ color:#ffb800; }
  .done { text-align:center; margin-top:20px; padding:16px; background:rgba(0,212,184,.08); border:1px solid rgba(0,212,184,.2); border-radius:12px; color:#00d4b8; font-weight:700; display:none; }
</style>

];

var WALLETS   = [{ name:'cash', balance:500 }, { name:'digital', balance:3500 }];
var SETTINGS  = [{ key:'budget_limit', value:'6000' }, { key:'alert_threshold', value:'80' }, { key:'savings_target', value:'500' }, { key:'currency', value:'₹' }];
var TRANSFERS = [
  { from_wallet:'cash',    to_wallet:'digital', amount:40,  note:'', tx_date:'2026-03-09', created_at:'2026-03-09T19:40:58+00:00' },
  { from_wallet:'digital', to_wallet:'cash',    amount:500, note:'', tx_date:'2026-03-11', created_at:'2026-03-11T12:54:43+00:00' }
];
var GOALS = [{ name:'Shoes', target_amount:2000, saved_amount:0, target_date:'2026-07-10', created_at:'2026-03-10T15:33:05+00:00' }];

function log(msg, type) {
  var div = document.getElementById('log');
  var span = document.createElement('div');
  span.className = type || 'inf';
  span.textContent = msg;
  div.appendChild(span);
  div.scrollTop = div.scrollHeight;
}

function col(name) { return db.collection('users').doc(UID).collection(name); }

async function deleteCollection(name) {
  var snap = await col(name).get();
  var batch = db.batch();
  snap.forEach(function(doc) { batch.delete(doc.ref); });
  await batch.commit();
  log('🗑️ Cleared ' + snap.size + ' docs from ' + name, 'warn');
}

async function clearAll() {
  document.getElementById('btn-clear').disabled = true;
  document.getElementById('log').innerHTML = '';
  log('Clearing all existing data...', 'inf');
  try {
    await deleteCollection('transactions');
    await deleteCollection('transfers');
    await deleteCollection('goals');
    await deleteCollection('wallets');
    await deleteCollection('settings');
    log('✅ All data cleared!', 'ok');
    log('Now click Step 2 to import fresh data.', 'inf');
    document.getElementById('btn-migrate').disabled = false;
  } catch(e) {
    log('❌ Error: ' + e.message, 'err');
    document.getElementById('btn-clear').disabled = false;
  }
}

async function runMigration() {
  document.getElementById('btn-migrate').disabled = true;
  log('', 'inf');
  log('Importing fresh data...', 'inf');
  try {
    // Wallets
    for (var w of WALLETS) {
      await col('wallets').doc(w.name).set({ balance: w.balance });
      log('✓ Wallet: ' + w.name + ' = ₹' + w.balance, 'ok');
    }
    // Settings
    for (var s of SETTINGS) {
      await col('settings').doc(s.key).set({ value: s.value });
      log('✓ Setting: ' + s.key, 'ok');
    }
    // Transactions
    log('Importing ' + TRANSACTIONS.length + ' transactions...', 'inf');
    for (var i = 0; i < TRANSACTIONS.length; i++) {
      await col('transactions').add(TRANSACTIONS[i]);
      log('✓ [' + (i+1) + '/' + TRANSACTIONS.length + '] ' + TRANSACTIONS[i].description + ' ₹' + TRANSACTIONS[i].amount, 'ok');
    }
    // Transfers
    for (var tr of TRANSFERS) {
      await col('transfers').add(tr);
      log('✓ Transfer: ' + tr.from_wallet + ' → ' + tr.to_wallet + ' ₹' + tr.amount, 'ok');
    }
    // Goals
    for (var g of GOALS) {
      await col('goals').add(g);
      log('✓ Goal: ' + g.name, 'ok');
    }
    log('', 'inf');
    log('🎉 All data imported correctly!', 'ok');
    document.getElementById('done').style.display = 'block';
  } catch(e) {
    log('❌ Error: ' + e.message, 'err');
    document.getElementById('btn-migrate').disabled = false;
  }
}
